version: 2.1

workflows:
  ci:
    jobs:
      - lint:
          filters:
            tags:
              ignore: /.*/

  publish:
    jobs:
      - publish-packages:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-.*)?$/
            branches:
              ignore: /.*/

jobs:
  lint:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout

      - restore_cache:
          keys:
            - node-v1-{{ checksum "package-lock.json" }}
            - node-v1-

      - run: npm ci

      - save_cache:
          key: node-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

      - run:
          name: Lint workspaces
          command: npm run lint

      - run:
          name: Check formatting
          command: npm run format:check

      - run:
          name: Typecheck workspaces
          command: npm run typecheck

  publish-packages:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout

      - restore_cache:
          keys:
            - node-v1-{{ checksum "package-lock.json" }}
            - node-v1-

      - run: npm ci

      - save_cache:
          key: node-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

      # NPM_TOKEN doit être configuré dans Project Settings > Environment Variables
      - run:
          name: Publish packages to npm
          command: ./scripts/publish-package --ci
          no_output_timeout: 10m
