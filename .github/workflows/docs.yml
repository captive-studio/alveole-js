name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy docs
    runs-on: [self-hosted]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @alveole/theme
        run: npm run build --workspace=packages/theme

      - name: Build @alveole/components
        run: npm run build --workspace=packages/components

      - name: Build @alveole/storybook
        run: npm run build --workspace=packages/storybook

      - name: Build docs
        run: npm run build --workspace=apps/docs

      - name: Create 404.html for SPA deep links
        run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - name: Disable Jekyll (allow _expo/ assets)
        run: touch apps/docs/dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/dist
