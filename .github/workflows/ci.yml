name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    name: Lint workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  format-check:
    name: Check formatting
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

  typecheck:
    name: Typecheck workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test-unit:
    name: Test Unit workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Jest)
        run: npm run test:unit

  publish-packages:
    name: Publish packages to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted]
    container: node:lts@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install dependencies
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm ci --no-audit --no-fund

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./scripts/publish-package --ci
