name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    name: Lint workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  format-check:
    name: Check formatting
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

  typecheck:
    name: Typecheck workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test-unit:
    name: Test Unit workspaces
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted]
    container: node:lts@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Jest)
        run: npm run test:unit

  publish-packages:
    name: Publish packages to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted]
    container: node:lts@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm ci --no-audit --no-fund

      - name: Publish packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./scripts/publish-package --ci
